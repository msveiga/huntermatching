html, body { background: #000; color: #fff; font-family: 'Unbounded', sans-serif; margin: 0; padding: 0; }
* { box-sizing: border-box; }
::-webkit-scrollbar { width: 8px; height: 8px; }
::-webkit-scrollbar-track { background: #0a0a0a; }
::-webkit-scrollbar-thumb { background: #323232; }
::-webkit-scrollbar-thumb:hover { background: #505050; }
.glow-green { box-shadow: 0 0 24px rgba(0,255,0,0.15); }
@keyframes pulse-glow { 0%, 100% { box-shadow: 0 0 12px rgba(0,255,0,0.2); } 50% { box-shadow: 0 0 24px rgba(0,255,0,0.5); } }
.pulse-glow { animation: pulse-glow 2s ease-in-out infinite; }
@keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
.shimmer { background: linear-gradient(90deg, transparent, rgba(0,255,0,0.1), transparent); background-size: 200% 100%; animation: shimmer 1.5s infinite; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
.fade-in { animation: fadeIn 0.4s ease-out; }
@keyframes scaleIn { from { opacity: 0; transform: scale(0.96); } to { opacity: 1; transform: scale(1); } }
.scale-in { animation: scaleIn 0.3s ease-out; }
